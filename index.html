<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UB Help Desk - Login</title>
<link rel="stylesheet" href="style.css">
<style>
body { background: var(--navy); display: flex; align-items: center; justify-content: center; }
.login-card {
  background: var(--white);
  border-radius: 14px;
  padding: 44px 48px;
  width: 100%;
  max-width: 440px;
  box-shadow: var(--s3);
}
.login-org  { font-size: 18px; font-weight: bold; color: var(--navy); margin-bottom: 4px; }
.login-sub  { font-size: 12px; color: var(--g400); margin-bottom: 28px; }
.login-heading { font-size: 24px; font-weight: bold; color: var(--navy); margin-bottom: 6px; }
.login-desc { font-size: 13px; color: var(--g400); margin-bottom: 24px; }
.role-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  background: var(--g100);
  padding: 4px;
  border-radius: 8px;
  margin-bottom: 24px;
}
.rtab {
  padding: 9px;
  text-align: center;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13.5px;
  font-weight: bold;
  color: var(--g600);
  border: none;
  background: transparent;
  font-family: Arial, Helvetica, sans-serif;
}
.rtab.active { background: var(--navy); color: var(--gold); }
.fg { margin-bottom: 16px; }
.fg label {
  display: block;
  font-size: 11px;
  font-weight: bold;
  color: var(--g600);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.fg input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--g200);
  border-radius: 8px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  color: var(--navy);
  outline: none;
  background: var(--white);
}
.fg input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,162,39,.1); }
.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--navy);
  color: var(--gold);
  border: none;
  border-radius: 8px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 6px;
}
.btn-login:hover { background: var(--navy2); }
.login-hint {
  margin-top: 18px;
  padding: 12px 14px;
  background: var(--g100);
  border-radius: 8px;
  font-size: 12px;
  color: var(--g600);
  line-height: 1.7;
}
.login-hint strong { color: var(--navy); }
@media (max-width: 500px) { .login-card { padding: 28px 20px; margin: 14px; } }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-org">University of Botswana</div>
  <div class="login-sub">Student Affairs Help Desk</div>
  <div class="login-heading">Welcome Back</div>
  <div class="login-desc">Sign in to access the student help desk portal</div>

  <div class="role-tabs">
    <button class="rtab active" id="tab-student" onclick="setRole('student')">Student</button>
    <button class="rtab" id="tab-admin" onclick="setRole('admin')">Administrator</button>
  </div>

  <div class="fg">
    <label>Student / Staff ID</label>
    <input type="text" id="loginId" placeholder="e.g. UB23050001 or ADM001">
  </div>
  <div class="fg">
    <label>Password</label>
    <input type="password" id="loginPw" placeholder="Enter your password" onkeydown="if(event.key==='Enter') doLogin()">
  </div>

  <button class="btn-login" onclick="doLogin()">Sign In</button>

  <div id="loginError" style="display:none;margin-top:12px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:7px;font-size:13px;color:#c0392b;"></div>

  <div class="login-hint">
    <strong>Demo Credentials</strong><br>
    Student: <strong>UB23050001</strong> / <strong>student123</strong><br>
    Admin: &nbsp;<strong>ADM001</strong> / <strong>admin123</strong>
  </div>
</div>

<script>
var selectedRole = 'student';

// ── Point this at your deployed API ──────────────────────
// Local dev:  http://localhost:3000
// Render:     https://ub-helpdesk-api.onrender.com
var API_BASE = 'https://ub-helpdesk-api.onrender.com';

function setRole(role) {
  selectedRole = role;
  document.getElementById('tab-student').classList.toggle('active', role === 'student');
  document.getElementById('tab-admin').classList.toggle('active', role === 'admin');
}

function setError(msg) {
  var el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function setLoading(on) {
  var btn = document.querySelector('.btn-login');
  btn.disabled = on;
  btn.textContent = on ? 'Signing in…' : 'Sign In';
}

async function doLogin() {
  var identifier = document.getElementById('loginId').value.trim();
  var password   = document.getElementById('loginPw').value.trim();

  if (!identifier || !password) { setError('Please enter your ID and password.'); return; }

  setLoading(true);
  setError('');

  try {
    var res = await fetch(API_BASE + '/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ identifier, password })
    });

    var data = await res.json();

    if (!res.ok) {
      setError(data.error || 'Invalid credentials. Please try again.');
      return;
    }

    // Verify the role matches the selected tab
    if (data.user.role !== selectedRole) {
      setError('This account is not registered as a ' + selectedRole + '.');
      return;
    }

    // Store JWT token + user profile
    sessionStorage.setItem('ub_token', data.token);
    sessionStorage.setItem('ub_user',  JSON.stringify({
      role: data.user.role,
      id:   data.user.id,
      name: data.user.name
    }));

    window.location.href = data.user.role === 'admin'
      ? 'admin-dashboard.html'
      : 'student-dashboard.html';

  } catch (err) {
    setError('Could not connect to the server. Check your connection or try again shortly.');
  } finally {
    setLoading(false);
  }
}
</script>
</body>
</html>
